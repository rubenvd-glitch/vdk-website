<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin login — VDK Business Services</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; background: #cfd4d0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Helvetica Neue', Arial, sans-serif; color: #22251f;
    }
    .card {
      background: #fff; border-radius: 12px; padding: 40px;
      width: min(400px, 92vw); box-shadow: 0 8px 30px rgba(0,0,0,.12);
    }
    h1 { font-size: 20px; letter-spacing: 2px; margin-bottom: 6px; }
    p.sub { color: #666; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px; font-size: 16px; border: 1px solid #c5c9c6;
      border-radius: 8px; margin-bottom: 16px;
    }
    input:focus { outline: 2px solid #22251f; border-color: transparent; }
    button {
      width: 100%; padding: 13px; font-size: 15px; font-weight: 600;
      background: #22251f; color: #fff; border: none; border-radius: 8px; cursor: pointer;
    }
    button:disabled { opacity: .6; cursor: wait; }
    .msg { font-size: 13px; margin-top: 14px; min-height: 18px; }
    .msg.err { color: #b00020; }
    .msg.ok { color: #1a7a3a; }
    #step2 { display: none; }
    .code-input { letter-spacing: 8px; text-align: center; font-size: 22px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>VDK ADMIN</h1>
    <p class="sub">Two-factor login via email</p>

    <div id="step1">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="info@vdkbusiness-services.nl" autocomplete="email">
      <button id="sendBtn">Send login code</button>
    </div>

    <div id="step2">
      <label for="code">6-digit code from your email</label>
      <input type="text" id="code" class="code-input" maxlength="6" inputmode="numeric" placeholder="••••••">
      <button id="verifyBtn">Verify &amp; log in</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    const msg = document.getElementById('msg');
    const emailInput = document.getElementById('email');

    function show(text, cls) { msg.textContent = text; msg.className = 'msg ' + (cls || ''); }

    document.getElementById('sendBtn').onclick = async (e) => {
      e.target.disabled = true;
      show('Sending...');
      try {
        const r = await fetch('/admin/request-code', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailInput.value })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Failed');
        show('If this email is authorized, a code has been sent.', 'ok');
        document.getElementById('step2').style.display = 'block';
        document.getElementById('code').focus();
      } catch (err) { show(err.message, 'err'); }
      e.target.disabled = false;
    };

    document.getElementById('verifyBtn').onclick = async (e) => {
      e.target.disabled = true;
      show('Checking...');
      try {
        const r = await fetch('/admin/verify', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailInput.value, code: document.getElementById('code').value })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Failed');
        window.location.href = '/admin';
      } catch (err) { show(err.message, 'err'); e.target.disabled = false; }
    };
  </script>
</body>
</html>
