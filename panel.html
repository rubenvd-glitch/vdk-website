<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin panel — VDK Business Services</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; background: #0e1116; color: #e6e9ed;
      font-family: 'Helvetica Neue', Arial, sans-serif; padding-bottom: 90px;
    }
    a { color: #7fb4f0; }
    header {
      background: #12161d; border-bottom: 1px solid #232a33; padding: 14px 28px;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 16px; letter-spacing: 2px; }
    header button {
      background: transparent; color: #e6e9ed; border: 1px solid #39424e;
      padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px;
    }
    header button:hover { background: #1c222b; }
    main { max-width: 860px; margin: 34px auto; padding: 0 20px; }
    .greeting { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .greeting-sub { color: #8b94a1; font-size: 14px; margin-bottom: 34px; }
    .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .section-head h2 { font-size: 22px; }
    .section-sub { color: #8b94a1; font-size: 14px; margin-bottom: 18px; }
    .btn-primary {
      background: #f2f4f6; color: #14181e; border: none; padding: 11px 18px;
      border-radius: 9px; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .btn-primary:hover { background: #ffffff; }
    .tabs { display: flex; gap: 18px; border-bottom: 1px solid #232a33; margin-bottom: 14px; }
    .tabs button {
      background: none; border: none; color: #8b94a1; font-size: 14px;
      padding: 10px 2px; cursor: pointer; border-bottom: 2px solid transparent;
    }
    .tabs button.active { color: #e6e9ed; border-bottom-color: #e6e9ed; font-weight: 700; }
    .empty { color: #8b94a1; font-size: 14px; padding: 26px 0; }
    .rem {
      background: #151a21; border: 1px solid #232a33; border-radius: 12px;
      padding: 16px 18px; margin-bottom: 12px; display: flex; gap: 14px; align-items: flex-start;
    }
    .prio {
      flex: 0 0 auto; font-size: 12px; font-weight: 800; padding: 4px 9px;
      border-radius: 6px; margin-top: 2px; color: #14181e;
    }
    .p1 { background: #e5484d; color: #fff; } .p2 { background: #f0883e; }
    .p3 { background: #eac54f; } .p4 { background: #2ea36f; color: #fff; }
    .rem-body { flex: 1; min-width: 0; }
    .rem-title { font-size: 15px; font-weight: 700; }
    .rem-title.done { text-decoration: line-through; color: #8b94a1; }
    .rem-note { font-size: 13px; color: #aeb6c0; margin-top: 4px; word-break: break-word; }
    .rem-meta { font-size: 12.5px; color: #8b94a1; margin-top: 7px; }
    .late { color: #e5484d; font-weight: 700; }
    .rem-actions { display: flex; flex-direction: column; gap: 7px; align-items: stretch; }
    .rem-actions button {
      background: transparent; border: 1px solid #39424e; color: #cfd6de;
      font-size: 13px; cursor: pointer; padding: 7px 14px; border-radius: 8px;
      white-space: nowrap; text-align: center;
    }
    .rem-actions button:hover { background: #1c222b; }
    .rem-actions button.ok { border-color: #2ea36f; color: #3fc98b; font-weight: 700; }
    .rem-actions button.ok:hover { background: rgba(46, 163, 111, .14); }
    .rem-actions button.danger { border-color: #55282b; color: #e5484d; }
    .rem-actions button.danger:hover { background: rgba(229, 72, 77, .12); }

    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 50;
      align-items: center; justify-content: center; padding: 16px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #171c24; border: 1px solid #2a323d; border-radius: 14px;
      width: min(560px, 100%); padding: 28px; max-height: 92vh; overflow: auto;
    }
    .modal h3 { font-size: 20px; margin-bottom: 4px; }
    .modal .sub { color: #8b94a1; font-size: 13.5px; margin-bottom: 20px; }
    .modal label { display: block; font-size: 13.5px; font-weight: 700; margin: 16px 0 7px; }
    .modal input[type=text], .modal textarea, .modal input[type=date], .modal input[type=time] {
      width: 100%; background: #10141a; color: #e6e9ed; border: 1px solid #2a323d;
      border-radius: 9px; padding: 11px 12px; font-size: 14px; font-family: inherit;
      color-scheme: dark;
    }
    .modal textarea { min-height: 74px; resize: vertical; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chips button {
      background: #10141a; color: #cfd6de; border: 1px solid #2a323d;
      padding: 9px 14px; border-radius: 8px; font-size: 13.5px; cursor: pointer;
    }
    .chips button.sel { background: #f2f4f6; color: #14181e; font-weight: 700; border-color: #f2f4f6; }
    .chips button.cp1.sel { background: #e5484d; border-color: #e5484d; color: #fff; }
    .chips button.cp2.sel { background: #f0883e; border-color: #f0883e; color: #14181e; }
    .chips button.cp3.sel { background: #eac54f; border-color: #eac54f; color: #14181e; }
    .chips button.cp4.sel { background: #2ea36f; border-color: #2ea36f; color: #fff; }
    .date-preview { color: #8b94a1; font-size: 13px; margin-top: 12px; min-height: 17px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
    .btn-ghost {
      background: none; border: none; color: #cfd6de; font-size: 14px; cursor: pointer; padding: 11px 14px;
    }
    .modal .err { color: #e5484d; font-size: 13px; margin-top: 10px; min-height: 16px; }

    .lock {
      position: fixed; left: 18px; bottom: 18px; z-index: 20;
      background: #151a21; border: 1px solid #232a33; border-radius: 12px;
      padding: 12px 16px; display: none; align-items: center; gap: 12px; max-width: 330px;
    }
    .lock.show { display: flex; }
    .lock .txt { font-size: 12.5px; color: #aeb6c0; line-height: 1.45; }
    .switch { position: relative; width: 42px; height: 24px; flex: 0 0 auto; cursor: pointer; }
    .switch input { display: none; }
    .slider {
      position: absolute; inset: 0; background: #39424e; border-radius: 999px; transition: .15s;
    }
    .slider:before {
      content: ""; position: absolute; width: 18px; height: 18px; border-radius: 50%;
      background: #fff; top: 3px; left: 3px; transition: .15s;
    }
    .switch input:checked + .slider { background: #2ea36f; }
    .switch input:checked + .slider:before { transform: translateX(18px); }
  </style>
</head>
<body>
  <header>
    <h1>VDK ADMIN</h1>
    <button id="logoutBtn">Uitloggen</button>
  </header>

  <main>
    <div class="greeting" id="greeting">…</div>
    <div class="greeting-sub" id="today"></div>

    <div class="section-head">
      <h2>Herinneringen</h2>
      <button class="btn-primary" id="newBtn">+ Nieuwe herinnering</button>
    </div>
    <div class="section-sub">Plan je taken en houd de eerstvolgende herinnering in de gaten.</div>

    <div class="tabs">
      <button id="tabActive" class="active">Actief</button>
      <button id="tabDone">Afgerond</button>
    </div>
    <div id="list"></div>
  </main>

  <div class="lock" id="lockBox">
    <label class="switch">
      <input type="checkbox" id="lockToggle">
      <span class="slider"></span>
    </label>
    <div class="txt" id="lockTxt">Alleen mijn e-mail kan inloggen</div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h3 id="modalTitle">Nieuwe herinnering</h3>
      <div class="sub">Plan een taak met een optionele notitie, datum en prioriteit.</div>

      <label>Titel *</label>
      <input type="text" id="fTitle" placeholder="Bijv. cadeau kopen voor verjaardag" maxlength="200">

      <label>Notitie (optioneel)</label>
      <textarea id="fNote" maxlength="2000"></textarea>

      <label>Wanneer?</label>
      <div class="chips" id="whenChips">
        <button data-days="0">Nu</button>
        <button data-days="1">Morgen</button>
        <button data-days="7">7 dagen</button>
        <button data-days="14">14 dagen</button>
        <button data-days="30">30 dagen</button>
        <button data-days="pick">Kies datum</button>
      </div>
      <input type="date" id="fDate" style="display:none; margin-top:10px;">

      <label>Tijd (optioneel)</label>
      <input type="time" id="fTime">
      <div class="date-preview" id="datePreview"></div>

      <label>Prioriteit</label>
      <div class="chips" id="prioChips">
        <button class="cp1" data-p="1">P1 — urgent</button>
        <button class="cp2" data-p="2">P2 — hoog</button>
        <button class="cp3" data-p="3">P3 — normaal</button>
        <button class="cp4" data-p="4">P4 — laag</button>
      </div>

      <div class="err" id="modalErr"></div>
      <div class="modal-actions">
        <button class="btn-ghost" id="cancelBtn">Annuleren</button>
        <button class="btn-primary" id="saveBtn">Opslaan</button>
      </div>
    </div>
  </div>

  <script>
    let me = null, reminders = [], view = 'active';
    let editing = null;
    let selDays = 0, selPrio = 4, pickedDate = null;

    const $ = (id) => document.getElementById(id);
    const fmt = (d) => d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
    const iso = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

    function greet() {
      const h = new Date().getHours();
      const word = h < 6 ? 'Goedenacht' : h < 12 ? 'Goedemorgen' : h < 18 ? 'Goedemiddag' : 'Goedenavond';
      const name = me.isAdmin ? 'Ruben' : me.email.split('@')[0];
      $('greeting').textContent = `${word}, ${name.charAt(0).toUpperCase() + name.slice(1)}`;
      $('today').textContent = new Date().toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function linkify(s) {
      return esc(s).replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    }

    function dueInfo(r) {
      if (!r.due) return '<span>Geen datum</span>';
      const dateStr = fmt(new Date(r.due + 'T00:00:00')) + (r.time ? ` om ${r.time}` : '');
      return `<span>${dateStr}</span>`;
    }

    function render() {
      const shown = reminders
        .filter((r) => (view === 'active' ? !r.done : r.done))
        .sort((a, b) => (a.due || '9999').localeCompare(b.due || '9999') || a.prio - b.prio);
      $('tabActive').textContent = `Actief (${reminders.filter((r) => !r.done).length})`;
      $('tabDone').textContent = `Afgerond (${reminders.filter((r) => r.done).length})`;
      if (!shown.length) {
        $('list').innerHTML = `<div class="empty">${view === 'active' ? 'Geen actieve herinneringen. Lekker rustig!' : 'Nog niets afgerond.'}</div>`;
        return;
      }
      $('list').innerHTML = shown.map((r) => `
        <div class="rem">
          <span class="prio p${r.prio}">P${r.prio}</span>
          <div class="rem-body">
            <div class="rem-title ${r.done ? 'done' : ''}">${esc(r.title)}</div>
            ${r.note ? `<div class="rem-note">${linkify(r.note)}</div>` : ''}
            <div class="rem-meta">${dueInfo(r)}</div>
          </div>
          <div class="rem-actions">
            ${r.done
              ? `<button onclick="toggleDone('${r.id}', false)">Heropenen</button>`
              : `<button class="ok" onclick="toggleDone('${r.id}', true)">✓ Afgerond</button>
                 <button onclick="openModal('${r.id}')">Plan opnieuw</button>`}
            <button class="danger" onclick="removeRem('${r.id}')">Verwijderen</button>
          </div>
        </div>`).join('');
    }

    async function api(path, opts) {
      const r = await fetch(path, opts);
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.error || 'Er ging iets mis');
      return d;
    }

    async function load() {
      try { me = await api('/api/me'); } catch { location.href = '/admin'; return; }
      greet();
      try {
        reminders = await api('/api/reminders');
        render();
      } catch (e) {
        $('list').innerHTML = `<div class="empty">${esc(e.message)}</div>`;
      }
      if (me.isAdmin) {
        try {
          const st = await api('/api/settings');
          $('lockToggle').checked = st.lockedToAdmin !== false;
          updateLockTxt();
          $('lockBox').classList.add('show');
        } catch (e) { /* opslag nog niet gekoppeld */ }
      }
    }

    function updateLockTxt() {
      $('lockTxt').innerHTML = $('lockToggle').checked
        ? '<strong>Vergrendeld:</strong> alleen jouw e-mail kan inloggen'
        : '<strong>Open:</strong> anderen kunnen een account aanmaken met hun e-mail';
    }

    $('lockToggle').onchange = async () => {
      try {
        await api('/api/settings', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lockedToAdmin: $('lockToggle').checked }),
        });
      } catch (e) { $('lockToggle').checked = !$('lockToggle').checked; alert(e.message); }
      updateLockTxt();
    };

    window.openModal = (id) => {
      editing = id || null;
      const r = id ? reminders.find((x) => x.id === id) : null;
      $('modalTitle').textContent = r ? 'Herinnering aanpassen' : 'Nieuwe herinnering';
      $('fTitle').value = r ? r.title : '';
      $('fNote').value = r ? r.note : '';
      selPrio = r ? r.prio : 4;
      selDays = 0;
      pickedDate = r && r.due ? r.due : null;
      $('fDate').style.display = pickedDate ? 'block' : 'none';
      $('fDate').value = pickedDate || '';
      $('fTime').value = r && r.time ? r.time : '';
      $('modalErr').textContent = '';
      paintChips();
      $('overlay').classList.add('open');
      $('fTitle').focus();
    };

    function paintChips() {
      document.querySelectorAll('#whenChips button').forEach((b) => {
        b.classList.toggle('sel', pickedDate ? b.dataset.days === 'pick' : Number(b.dataset.days) === selDays);
      });
      document.querySelectorAll('#prioChips button').forEach((b) => {
        b.classList.toggle('sel', Number(b.dataset.p) === selPrio);
      });
      const d = targetDate();
      const t = $('fTime').value;
      $('datePreview').textContent = d ? `Herinnering op ${fmt(new Date(d + 'T00:00:00'))}${t ? ` om ${t}` : ''}` : '';
    }

    function targetDate() {
      if (pickedDate) return pickedDate;
      const d = new Date(); d.setDate(d.getDate() + selDays);
      return iso(d);
    }

    $('whenChips').onclick = (e) => {
      const b = e.target.closest('button'); if (!b) return;
      if (b.dataset.days === 'pick') {
        pickedDate = $('fDate').value || targetDate();
        $('fDate').value = pickedDate;
        $('fDate').style.display = 'block';
      } else {
        pickedDate = null; selDays = Number(b.dataset.days);
        $('fDate').style.display = 'none';
      }
      paintChips();
    };
    $('fDate').onchange = () => { pickedDate = $('fDate').value; paintChips(); };
    $('fTime').onchange = paintChips;
    $('prioChips').onclick = (e) => {
      const b = e.target.closest('button'); if (!b) return;
      selPrio = Number(b.dataset.p); paintChips();
    };

    $('cancelBtn').onclick = () => $('overlay').classList.remove('open');
    $('overlay').onclick = (e) => { if (e.target === $('overlay')) $('overlay').classList.remove('open'); };

    $('saveBtn').onclick = async () => {
      const payload = {
        action: editing ? 'update' : 'create',
        id: editing || undefined,
        title: $('fTitle').value,
        note: $('fNote').value,
        due: targetDate(),
        time: $('fTime').value || '',
        prio: selPrio,
      };
      if (!payload.title.trim()) { $('modalErr').textContent = 'Vul een titel in.'; return; }
      try {
        const d = await api('/api/reminders', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        reminders = d.reminders;
        $('overlay').classList.remove('open');
        render();
      } catch (e) { $('modalErr').textContent = e.message; }
    };

    window.toggleDone = async (id, done) => {
      try {
        const d = await api('/api/reminders', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'update', id, done }),
        });
        reminders = d.reminders; render();
      } catch (e) { alert(e.message); }
    };

    window.removeRem = async (id) => {
      if (!confirm('Deze herinnering verwijderen?')) return;
      try {
        const d = await api('/api/reminders', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'delete', id }),
        });
        reminders = d.reminders; render();
      } catch (e) { alert(e.message); }
    };

    $('newBtn').onclick = () => openModal(null);
    $('tabActive').onclick = () => { view = 'active'; $('tabActive').classList.add('active'); $('tabDone').classList.remove('active'); render(); };
    $('tabDone').onclick = () => { view = 'done'; $('tabDone').classList.add('active'); $('tabActive').classList.remove('active'); render(); };
    $('logoutBtn').onclick = async () => { await fetch('/admin/logout', { method: 'POST' }); location.href = '/'; };

    load();
  </script>
</body>
</html>
